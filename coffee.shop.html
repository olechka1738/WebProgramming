<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Java Haven</title>

<style>

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    display: grid;
    grid-template-areas:
        "header"
        "nav"
        "main"
        "footer";
    grid-template-rows: auto auto 1fr auto;
    min-height: 100vh;
    font-family: Georgia, serif;
    background-color: #f5f1e6; /* cream */
    color: #4b2e2e; /* dark brown */
}

header {
    grid-area: header;
    background-color: #6f4e37;
    color: white;
    text-align: center;
    padding: 30px 20px;
}

nav {
    grid-area: nav;
    background-color: #8b5e3c;
    padding: 15px;
}

main {
    grid-area: main;
    padding: 40px 20px;
    text-align: center;
}

footer {
    grid-area: footer;
    background-color: #6f4e37;
    color: white;
    text-align: center;
    padding: 20px;
}

nav ul {
    display: flex;
    justify-content: center;
    list-style: none;
    gap: 30px;
}

nav a {
    text-decoration: none;
    color: white;
    font-weight: bold;
}

nav a:hover {
    color: #f5f1e6;
}

.flex-container {
    display: flex;
    justify-content: space-evenly;
    align-items: center;
    flex-wrap: wrap;
    margin-top: 30px;
    gap: 20px;
}

.flex-item {
    background-color: #d7ccc8;
    padding: 20px 40px;
    border-radius: 8px;
    font-weight: bold;
    box-shadow: 2px 4px 8px rgba(0,0,0,0.2);
    transition: transform 0.3s ease;
}

.flex-item:hover {
    transform: scale(1.05);
}

@media (max-width: 768px) {
    nav ul {
        flex-direction: column;
        align-items: center;
        gap: 15px;
    }

    .flex-container {
        flex-direction: column;
    }
}

</style>
</head>

<body>

<header>
    <h1>Java Haven</h1>
    <p>Your daily dose of caffeine and comfort.</p>
</header>

<nav>
    <ul>
        <li><a href="#menu">Menu</a></li>
        <li><a href="#about">About Us</a></li>
        <li><a href="#contact">Contact</a></li>
    </ul>
</nav>

<main>
    <h2>Featured Coffees</h2>

    <div class="flex-container">
        <div class="flex-item">Espresso</div>
        <div class="flex-item">Cappuccino</div>
        <div class="flex-item">Latte</div>
        <div class="flex-item">Mocha</div>
    </div>
</main>

<footer>
    <p>&copy; 2025 Java Haven. All Rights Reserved.</p>
</footer>

</body>
</html>

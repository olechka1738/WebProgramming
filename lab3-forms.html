<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cofee Order Form</title>
</head>    
<body>
  <h1>Coffee Order Form</h1>

  <form>
    <label for="name">Customer Name:</label>
    <input type="text" id="name" name="name">

    <br><br>

    <label for="email">Email Address:</label>
    <input type="email" id="email" name="email">

    <br><br>
    
    <label for="coffee">Coffee type:</label>
    <input type="text" id="coffee" name="coffee">
    <option>Latte</option>
    <option>Cappuccino</option>
    <option>Americano</option>
    <option>Espresso</option>
</select>

    <br><br>

    <p>Size:</p>
<input type="radio" id="small" name="size" value="small">
<label for="small">Small</label><br>

<input type="radio" id="medium" name="size" value="medium">
<label for="medium">Medium</label><br>

<input type="radio" id="large" name="size" value="large">
<label for="large">Large</label>

<br><br>

<p>Extras:</p>
<input type="checkbox" id="whipped" name="extras" value="whipped">
<label for="whipped">Whipped Cream</label><br>

<input type="checkbox" id="shot" name="extras" value="shot">
<label for="shot">Extra Shot</label><br>

<input type="checkbox" id="almond" name="extras" value="almond">
<label for="almond">Almond Milk</label>

<br><br>

<label for="instructions">Special Instructions:</label><br>
<textarea id="instructions" name="instructions" rows="4" cols="40"></textarea>

<br><br>


<button type="submit">Submit</button>
<form action="https://www.w3schools.com/action_page.php" method="get">
</body>
</html>
